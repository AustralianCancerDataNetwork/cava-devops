# Canonical Dependabot config for CAVA package repos.
# Copy to .github/dependabot.yml in the target repo. The `allow` list should
# be trimmed to whichever sibling packages that repo actually depends on.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    allow:
      - dependency-name: "oa-configurator"
      - dependency-name: "orm-loader"
      - dependency-name: "omop-alchemy"
      - dependency-name: "omop-emb"
      - dependency-name: "omop-graph"

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: Breaking Changes
    labels: ['major', 'breaking']
  - title: Features
    labels: ['minor', 'feature']
  - title: Fixes
    labels: ['patch', 'fix']
  - title: Chores
    labels: ['chore', 'dependencies']

change-template: |
  - **$TITLE** (#$NUMBER) by @$AUTHOR
    $BODY

version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['minor', 'feature']
  patch:
    labels: ['patch', 'fix', 'chore', 'dependencies']
  default: patch

exclude-labels: ['skip-changelog']

autolabeler: []

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: Breaking Changes
    labels: ['breaking']
  - title: Features
    labels: ['feature']
  - title: Fixes
    labels: ['fix']
  - title: Chores
    labels: ['chore', 'dependencies']

template: |
  $CHANGES

change-template: |
  - **$TITLE** (#$NUMBER) by @$AUTHOR
  $BODY

version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['feature']
  patch:
    labels: ['fix', 'chore', 'dependencies']
  default: patch

exclude-labels: ['skip-changelog']

autolabeler: []

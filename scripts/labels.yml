# Canonical label set for all CAVA package repos.
# Apply with: scripts/bootstrap-labels.sh <owner/repo>
labels:
  - name: breaking
    color: 'B60205'
    description: 'Incompatible API change. MAJOR: x+1.y.z'
  - name: feature
    color: '0E8A16'
    description: 'New backwards-compatible functionality. MINOR: x.y+1.z'
  - name: fix
    color: '0075CA'
    description: 'Bug fix, backwards-compatible. PATCH: x.y.z+1'
  - name: chore
    color: 'FEF2C0'
    description: 'Maintenance, refactoring, or housekeeping. Excluded from changelog, no version bump.'
  - name: dependencies
    color: '6F42C1'
    description: 'Dependency update. PATCH: x.y.z+1'

site_name: cava-devops
site_description: Reusable CI/CD workflows for AustralianCancerDataNetwork Python packages
site_url: https://australiancancerdatanetwork.github.io/cava-devops/
repo_url: https://github.com/AustralianCancerDataNetwork/cava-devops
repo_name: AustralianCancerDataNetwork/cava-devops

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Labels: labels.md
  - Workflows:
    - Overview: workflows/index.md
    - label-gate: workflows/label-gate.md
    - build-test: workflows/build-test.md
    - build-test-postgres: workflows/build-test-postgres.md
    - release-drafter: workflows/release-drafter.md
    - publish: workflows/publish.md
    - deploy-docs: workflows/deploy-docs.md
    - manual-release: workflows/manual-release.md
  - Guides:
    - Day-to-day PR workflow: guides/pr-workflow.md
    - Onboard a new repo: guides/setup-new-repo.md
    - Extending workflows: guides/extending-workflows.md

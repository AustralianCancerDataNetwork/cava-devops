name: Build Distribution
# Reusable workflow: verifies the tag is on main, builds the wheel and sdist,
# and uploads them as a workflow artifact named "dist" for the caller to publish.
# The publish step (pypa/gh-action-pypi-publish) must run in the CALLING
# workflow so that the OIDC job_workflow_ref matches the trusted publisher
# configuration on PyPI/TestPyPI.
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used to build the wheel
        type: string
        default: '3.12'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Verify tag is on main
        run: |
          if ! git branch -r --contains "${{ github.ref_name }}" | grep -q "origin/main"; then
            echo "Tag ${{ github.ref_name }} is not reachable from origin/main. Aborting."
            exit 1
          fi

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Build
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

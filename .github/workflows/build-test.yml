name: Build and Test
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        type: string
        default: '3.12'
        required: false
      ruff:
        description: Run ruff check
        type: boolean
        default: true
        required: false
      setup-script:
        description: >
          Path (relative to repo root) of a shell script to run before tests.
          Use for service setup that cannot be expressed as a generic input
          (e.g. pgvector bootstrap, custom fixtures).
        type: string
        default: ''
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run setup script
        if: inputs.setup-script != ''
        run: bash ${{ inputs.setup-script }}

      - name: Lint
        if: inputs.ruff
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

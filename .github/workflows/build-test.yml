name: Build and Test
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        type: string
        default: '3.12'
        required: false
      ruff:
        description: Run ruff check
        type: boolean
        default: true
        required: false
      setup-commands:
        description: >
          Shell commands to run before tests (e.g. to write a config file).
          Passed as a YAML block scalar; no external script file needed.
        type: string
        default: ''
        required: false
      ty-src:
        description: Path passed to `ty check` for type checking
        type: string
        default: 'src/'
        required: false
      resolution:
        description: >
          uv resolution strategy (highest, lowest, lowest-direct). Use
          lowest-direct to verify declared floor versions are sufficient.
        type: string
        default: 'highest'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --resolution ${{ inputs.resolution }} --all-extras --dev

      - name: Run setup commands
        if: inputs.setup-commands != ''
        run: ${{ inputs.setup-commands }}

      - name: Type check
        run: uv run --resolution ${{ inputs.resolution }} ty check ${{ inputs.ty-src }}

      - name: Lint
        if: inputs.ruff
        run: uv run --resolution ${{ inputs.resolution }} ruff check .

      - name: Test
        run: uv run --resolution ${{ inputs.resolution }} pytest -q

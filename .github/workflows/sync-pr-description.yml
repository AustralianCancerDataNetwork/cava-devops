name: Sync PR Description
# Rewrites the PR's description field with the squash-merge commit's body.
# Must run before release-drafter so $BODY reflects the merge-time summary,
# not the stale PR opening description.
on:
  workflow_call:

jobs:
  sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.merge_commit_sha;
            if (!sha) {
              console.log('No merge_commit_sha found — skipping.');
              return;
            }
            const { data: commit } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            // Everything after the first blank line is the extended description.
            // Each line is pre-indented by 2 spaces so that multi-line bodies
            // render as a consistent nested block under the PR title bullet in
            // release-drafter's change-template.
            const [, ...rest] = commit.message.split('\n\n');
            const rawBody = rest.join('\n\n').trim();
            const body = rawBody.split('\n').map(l => l.length > 0 ? '  ' + l : l).join('\n');
            if (body) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body,
              });
              console.log('PR description updated from merge commit body.');
            } else {
              console.log('Merge commit has no body — PR description unchanged.');
            }

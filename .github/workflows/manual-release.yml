name: Manual Release
# Emergency escape hatch: create a tag and GitHub release without going through
# the normal draft-publish flow. Use only when the normal path is broken.
on:
  workflow_call:
    inputs:
      version:
        description: Version to release (e.g. 1.2.3 — no leading v)
        type: string
        required: true
      ref:
        description: Branch or commit SHA to tag (defaults to main)
        type: string
        default: 'main'
        required: false
      prerelease:
        description: Mark as pre-release
        type: boolean
        default: false
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be X.Y.Z (no leading v). Got: ${{ inputs.version }}"
            exit 1
          fi

      - name: Create tag and release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ inputs.version }}';
            const tag = `v${version}`;
            const sha = context.sha;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha,
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: `Manual release ${tag}`,
              prerelease: ${{ inputs.prerelease }},
              draft: false,
            });

            console.log(`Created release ${tag} at ${sha}.`);
